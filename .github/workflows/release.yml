name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build backend sidecar
        run: |
          dotnet publish PosWeb/PosWeb.csproj -c Release -r win-x64 --self-contained true -o publish
          New-Item -ItemType Directory -Force -Path frontend\src-tauri\binaries
          Copy-Item publish\PosWeb.exe frontend\src-tauri\binaries\posweb-backend-x86_64-pc-windows-msvc.exe

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Tauri
        run: npm run tauri build
        working-directory: frontend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/src-tauri/target/release/bundle/msi/*.msi
