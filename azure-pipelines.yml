trigger:
  branches:
    include:
      - master
      - main # Incluimos ambas por seguridad en el disparador

variables:
- group: Github-Sync-Keys

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self
  persistCredentials: true
  clean: true
  fetchDepth: 0 # Forzamos a que descargue todo el historial y ramas (evita el shallow clone)

- script: |
    # Configurar la identidad de Git
    git config --global user.name "PosWeb Sync Bot"
    git config --global user.email "deployments@posweb.com"

    # Detectar cuál es la rama actual en Azure (main o master)
    BUILD_BRANCH="$(Build.SourceBranchName)"
    echo "La rama actual detectada en Azure es: $BUILD_BRANCH"

    # Asegurarnos de estar parados en esa rama localmente
    git checkout $BUILD_BRANCH

    # Formatear la URL de GitHub con el token seguro
    GITHUB_URL="https://$(GITHUB_PAT)@github.com/NahueelN/PosWeb.git"

    echo "Añadiendo el repositorio remoto de GitHub..."
    # Usamos || true por si el remoto ya existe de una ejecución previa
    git remote add github $GITHUB_URL || git remote set-url github $GITHUB_URL

    echo "Sincronizando únicamente la rama $BUILD_BRANCH..."
    git fetch github $BUILD_BRANCH
    git merge FETCH_HEAD --no-edit || echo "Nothing to merge"
    git push github $BUILD_BRANCH

    echo "Sincronizando los tags para las GitHub Actions y Releases..."
    git push github --tags
  displayName: 'Sincronizar rama activa a GitHub'